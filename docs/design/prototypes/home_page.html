<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow - Welcome</title>
    <style>
        :root {
            --ink: #1a1a1a;
            --bg: #ffffff;
            --apple-green: #b5d146;
            --apple-leaf: #7c8640;
            --apple-stem: #6b4b3b;
        }

        * {
            box-sizing: border-box;
            /* 使用具有手写感的字体库，如果没有则回退到 Comic Sans */
            font-family: "Comic Sans MS", "Chalkboard SE", "Marker Felt", "Microsoft YaHei", sans-serif;
        }

        body {
            margin: 0;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 外部大手绘边框 */
        .main-frame {
            background: var(--bg);
            border: 4px solid var(--ink);
            border-radius: 45px;
            width: 100%;
            max-width: 1000px;
            height: 560px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 12px 12px 0px rgba(0,0,0,0.05);
        }

        /* 顶部导航容器 */
        .nav-container {
            margin-top: 30px;
            border: 3px solid var(--ink);
            border-radius: 18px;
            padding: 8px 12px;
            display: flex;
            gap: 12px;
            background: white;
        }

        .nav-btn {
            border: 2px solid var(--ink);
            border-radius: 10px;
            padding: 6px 20px;
            font-size: 16px;
            font-weight: bold;
            color: var(--ink);
            text-decoration: none;
            background: white;
            transition: all 0.1s;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 0 var(--ink);
        }

        /* 中间欢迎区域 */
        .hero-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin-bottom: 60px;
        }

        .welcome-title {
            font-size: 48px;
            margin-bottom: 30px;
            color: var(--ink);
            letter-spacing: 1px;
        }

        /* 苹果图标容器 */
        .apple-icon {
            width: 120px;
            height: 120px;
        }

        /* 模拟手绘感的微动效果 */
        @keyframes wobble {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-2deg); }
            75% { transform: rotate(2deg); }
            100% { transform: rotate(0deg); }
        }

        .apple-icon:hover {
            animation: wobble 0.5s ease-in-out infinite;
        }

    </style>
</head>
<body>

    <div class="main-frame">
        <!-- 顶部导航 -->
        <nav class="nav-container">
            <a href="#" class="nav-btn">Home</a>
            <a href="#" class="nav-btn">Dashboard</a>
            <a href="#" class="nav-btn">Tasks</a>
            <a href="#" class="nav-btn">Focus</a>
            <a href="#" class="nav-btn">Settings</a>
        </nav>

        <!-- 主内容区 -->
        <main class="hero-section">
            <h1 class="welcome-title">Welcome To StudyFlow!</h1>
            
            <!-- 苹果 SVG 图标 -->
            <div class="apple-icon">
                <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                    <!-- 叶子 -->
                    <path d="M75 35 C 85 25, 95 30, 95 45 C 85 55, 75 50, 75 35" fill="var(--apple-leaf)" stroke="var(--ink)" stroke-width="2"/>
                    <!-- 梗 -->
                    <path d="M60 45 L 65 30" stroke="var(--apple-stem)" stroke-width="5" stroke-linecap="round"/>
                    <!-- 果实主体 -->
                    <path d="M60 105 
                             C 30 105, 20 85, 20 65 
                             C 20 45, 40 40, 60 45 
                             C 80 40, 100 45, 100 65 
                             C 100 85, 90 105, 60 105" 
                          fill="var(--apple-green)" stroke="var(--ink)" stroke-width="3"/>
                    <!-- 反光点 -->
                    <ellipse cx="40" cy="60" rx="6" ry="10" fill="white" opacity="0.6" transform="rotate(20, 40, 60)"/>
                    <!-- 顶部小凹槽 -->
                    <path d="M50 48 Q 60 55 70 48" fill="none" stroke="var(--ink)" stroke-width="3" stroke-linecap="round"/>
                </svg>
            </div>
        </main>
    </div>

</body>
</html>
