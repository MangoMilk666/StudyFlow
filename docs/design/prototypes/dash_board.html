<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow - Dashboard</title>
    <style>
        :root {
            --ink: #1a1a1a;
            --bg: #ffffff;
            --panel-todo: #fbc4c4;      /* 浅粉色 */
            --panel-progress: #fdf2b1;  /* 浅黄色 */
            --panel-review: #b1d7fd;    /* 浅蓝色 */
            --panel-done: #b1fdbd;      /* 浅绿色 */
        }

        * {
            box-sizing: border-box;
            /* 模拟手写感字体 */
            font-family: "Comic Sans MS", "Chalkboard SE", "Marker Felt", "Microsoft YaHei", sans-serif;
        }

        body {
            margin: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 主容器外框 */
        .main-frame {
            background: var(--bg);
            border: 4px solid var(--ink);
            border-radius: 40px;
            width: 100%;
            max-width: 1000px;
            padding: 30px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.05);
        }

        /* 顶部导航 */
        .nav-bar {
            border: 3px solid var(--ink);
            border-radius: 15px;
            display: flex;
            gap: 10px;
            padding: 8px;
            width: fit-content;
            margin: 0 auto 40px auto;
            background: white;
        }

        .nav-item {
            border: 2px solid var(--ink);
            border-radius: 10px;
            padding: 6px 18px;
            font-weight: bold;
            color: var(--ink);
            text-decoration: none;
            background: white;
            transition: all 0.2s;
        }

        /* Dashboard 激活状态：斜纹背景 */
        .nav-item.active {
            background: #e6f3ff;
            background-image: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 5px,
                rgba(0, 150, 255, 0.1) 5px,
                rgba(0, 150, 255, 0.1) 10px
            );
        }

        /* 2x2 布局网格 */
        .kanban-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 30px;
        }

        /* 面板基础样式 */
        .panel {
            border: 3px solid var(--ink);
            border-radius: 30px;
            padding: 20px;
            min-height: 220px;
        }

        .panel-title {
            text-align: center;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 25px;
            color: var(--ink);
        }

        /* 任务标签（椭圆） */
        .chip-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: flex-start;
        }

        .task-chip {
            background: white;
            border: 2px solid var(--ink);
            border-radius: 50%; /* 基础圆形 */
            padding: 15px 25px;
            min-width: 100px;
            text-align: center;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 椭圆修正 */
            border-radius: 100px; 
            line-height: 1.2;
        }

        /* 面板颜色区分 */
        .todo { background-color: var(--panel-todo); }
        .progress { background-color: var(--panel-progress); }
        .review { background-color: var(--panel-review); }
        .done { background-color: var(--panel-done); }

        /* 响应式：小屏幕变单列 */
        @media (max-width: 768px) {
            .kanban-grid {
                grid-template-columns: 1fr;
            }
            .main-frame {
                border-radius: 20px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="main-frame">
        <!-- 导航栏 -->
        <nav class="nav-bar">
            <a href="#" class="nav-item">Home</a>
            <a href="#" class="nav-item active">Dashboard</a>
            <a href="#" class="nav-item">Tasks</a>
            <a href="#" class="nav-item">Focus</a>
            <a href="#" class="nav-item">Settings</a>
        </nav>

        <!-- 看板网格 -->
        <main class="kanban-grid">
            <!-- To Do -->
            <section class="panel todo">
                <h2 class="panel-title">To Do</h2>
                <div class="chip-container">
                    <div class="task-chip">KMP<br>Algo</div>
                </div>
            </section>

            <!-- In Progress -->
            <section class="panel progress">
                <h2 class="panel-title">In Progress</h2>
                <div class="chip-container">
                    <div class="task-chip">it5003 PS4</div>
                </div>
            </section>

            <!-- Review -->
            <section class="panel review">
                <h2 class="panel-title">Review</h2>
                <div class="chip-container">
                    <div class="task-chip">Meta<br>Interview</div>
                    <div class="task-chip">it5007 quiz3</div>
                </div>
            </section>

            <!-- Done -->
            <section class="panel done">
                <h2 class="panel-title">Done</h2>
                <div class="chip-container">
                    <div class="task-chip">cs5223 PS1</div>
                </div>
            </section>
        </main>
    </div>

</body>
</html>
