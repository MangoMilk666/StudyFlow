<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow - Settings</title>
    <style>
        :root {
            --ink: #1a1a1a;
            --bg: #ffffff;
            /* 配色方案 */
            --color-blue: #d9e9ff;
            --color-yellow: #fff4b8;
            --color-green: #d9f2e1;
            --color-red: #ffd9df;
            /* 边框颜色 */
            --border-blue: #7fb3ff;
            --border-yellow: #ffcf66;
            --border-green: #7bd3a0;
            --border-red: #ff8fa3;
        }

        * {
            box-sizing: border-box;
            font-family: "Comic Sans MS", "Chalkboard SE", "Marker Felt", "Microsoft YaHei", sans-serif;
        }

        body {
            margin: 0;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 主容器 */
        .main-frame {
            background: var(--bg);
            border: 4px solid var(--ink);
            border-radius: 40px;
            width: 100%;
            max-width: 1000px;
            padding: 40px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.05);
        }

        /* 顶部导航 */
        .nav-bar {
            border: 3px solid var(--ink);
            border-radius: 15px;
            display: flex;
            gap: 10px;
            padding: 8px;
            width: fit-content;
            margin: 0 auto 30px auto;
            background: white;
        }

        .nav-item {
            border: 2px solid var(--ink);
            border-radius: 10px;
            padding: 6px 20px;
            font-weight: bold;
            color: var(--ink);
            text-decoration: none;
            background: white;
        }

        /* Settings 激活状态：蓝色斜纹 */
        .nav-item.active {
            background: var(--color-blue);
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 6px,
                rgba(127, 179, 255, 0.2) 6px,
                rgba(127, 179, 255, 0.2) 12px
            );
        }

        /* 设置面板 */
        .settings-panel {
            border: 3px solid var(--ink);
            border-radius: 30px;
            padding: 10px 30px 30px 30px;
        }

        .section {
            margin-top: 20px;
        }

        .section-header {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--ink);
            padding-left: 10px;
        }

        .divider {
            border-top: 2px solid var(--ink);
            margin-bottom: 20px;
        }

        /* 按钮行布局 */
        .button-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }

        /* 按钮通用样式 */
        .pill-btn {
            border: 3px solid var(--ink);
            border-radius: 15px;
            padding: 10px 30px;
            font-size: 18px;
            font-weight: bold;
            color: var(--ink);
            cursor: pointer;
            min-width: 180px;
            text-align: center;
            transition: transform 0.1s;
        }

        .pill-btn:hover {
            transform: translateY(-2px);
        }

        /* 斜纹函数 */
        .hatch {
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 6px,
                rgba(0, 0, 0, 0.05) 6px,
                rgba(0, 0, 0, 0.05) 12px
            );
        }

        /* 各部分按钮颜色及对应的斜纹色 */
        .btn-blue { 
            background-color: var(--color-blue); 
            background-image: repeating-linear-gradient(45deg, transparent, transparent 6px, rgba(127, 179, 255, 0.3) 6px, rgba(127, 179, 255, 0.3) 12px);
        }
        .btn-yellow { 
            background-color: var(--color-yellow); 
            background-image: repeating-linear-gradient(45deg, transparent, transparent 6px, rgba(255, 207, 102, 0.3) 6px, rgba(255, 207, 102, 0.3) 12px);
        }
        .btn-green { 
            background-color: var(--color-green); 
            background-image: repeating-linear-gradient(45deg, transparent, transparent 6px, rgba(123, 211, 160, 0.3) 6px, rgba(123, 211, 160, 0.3) 12px);
        }
        .btn-red { 
            background-color: var(--color-red); 
            background-image: repeating-linear-gradient(45deg, transparent, transparent 6px, rgba(255, 143, 163, 0.3) 6px, rgba(255, 143, 163, 0.3) 12px);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .button-row {
                flex-direction: column;
                gap: 15px;
            }
            .pill-btn {
                width: 100%;
            }
            .main-frame {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="main-frame">
        <!-- 导航 -->
        <nav class="nav-bar">
            <a href="#" class="nav-item">Home</a>
            <a href="#" class="nav-item">Dashboard</a>
            <a href="#" class="nav-item">Tasks</a>
            <a href="#" class="nav-item">Focus</a>
            <a href="#" class="nav-item active">Settings</a>
        </nav>

        <!-- 设置区域 -->
        <main class="settings-panel">
            <!-- Account -->
            <section class="section">
                <h2 class="section-header">Account</h2>
                <div class="divider"></div>
                <div class="button-row">
                    <button class="pill-btn btn-blue">Change Email</button>
                    <button class="pill-btn btn-blue">Option Bar1</button>
                </div>
            </section>

            <!-- Security -->
            <section class="section">
                <h2 class="section-header">Security</h2>
                <div class="divider"></div>
                <div class="button-row">
                    <button class="pill-btn btn-yellow">Device Management</button>
                    <button class="pill-btn btn-yellow">Option Bar1</button>
                </div>
            </section>

            <!-- Privacy -->
            <section class="section">
                <h2 class="section-header">Privacy</h2>
                <div class="divider"></div>
                <div class="button-row">
                    <button class="pill-btn btn-green">Data Sharing</button>
                    <button class="pill-btn btn-green">Option Bar1</button>
                </div>
            </section>

            <!-- Preferences -->
            <section class="section">
                <h2 class="section-header">Preferences</h2>
                <div class="divider"></div>
                <div class="button-row">
                    <button class="pill-btn btn-red">Languages</button>
                    <button class="pill-btn btn-red">Option Bar1</button>
                </div>
            </section>
        </main>
    </div>

</body>
</html>
