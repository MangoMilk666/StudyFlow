# 管理和编排多个容器的运行，启动一整套相互关联的服务（前端 + 后端）
services:
  # Backend API Service
  backend:
    # 固定 image 名称可以避免因为项目名变化导致重复生成多份镜像（占用磁盘空间）。
    # 如需强制重建请显式运行：docker compose build backend
    image: studyflow-backend:dev
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studyflow-backend
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MONGO_URI=${MONGO_URI:-}
      - MONGO_USERNAME=${MONGO_USERNAME:-}
      - MONGO_PASSWORD=${MONGO_PASSWORD:-}
      - MONGO_AUTH_SOURCE=${MONGO_AUTH_SOURCE:-admin}
      - JWT_SECRET=${JWT_SECRET:-}
      - CANVAS_BASE_URL=${CANVAS_BASE_URL:-}
      - CANVAS_TOKEN=${CANVAS_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - CHROMA_PERSIST_DIR=/data/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - studyflow-network
    restart: unless-stopped
    volumes: # 数据持久化
      - chroma-data:/data/chroma

  # Frontend Web Service
  frontend:
    image: studyflow-frontend:dev
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: studyflow-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - studyflow-network
    restart: unless-stopped

# Named volumes for data persistence
volumes:
  chroma-data:
    driver: local

# Network for service communication
networks:
  studyflow-network:
    driver: bridge
